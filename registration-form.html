<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width =device width initial scale=1.0">
    <title>Course Registration Form</title>
</head>
<body>
        <header>
            <h1>
                Web Development Course Registration
            </h1>
            <p>
                Fill Out This Form to Register
            </p>
        </header>
        <main>
           <form action="submit.html" method="Post">
            <fieldset>
                <legend>
                    personal information
                </legend>
                <label for="full name"> full name
                </label>
                <input id="full name" 
                required
                 placeholder="Ayoola Saheed"
                  name="full name"
                   type="text">
                <label for="email"> Email</label>
                <input id="email" 
                    required
                     placeholder="olareal2dcore@gmail.com"
                    type="email">
                <label for="phone-number"> phone-number</label>
                <input
                     id="phone-number"
                    placeholder="+234-803-335-5346"
                    name="phone=number"
                    pattern="[0-9] {3} - [0-9] {3} -[0-9] {4} -[0-9] {4}"
                    type="tel">
                <label for="DOB"> Date of Birth</label>
                <input id="DOB"
                    required
                    name="DOB"
                    type="date">
            </fieldset>
            <fieldset>
                <legend>Course Selection</legend>
                <p>which course do you want to enroll in?</p>
                <label for="HTML-basics">HTML basics 1 month</label>
                <input
                value="HTML-basic"
                 name="Course"
                 type="radio"
                 id="HTML basic"
                  required>
                <label for="CSS-Foundermental">CSS foundermentals for 1 month</label>
                <input value="CSS-Foundamentals"
                 name="Course"
                 type="radio"
                 id="CSS Foundermentals" >
                 <label for="JavaScript-intro ">Java script for 1 month</label>
                <input value="JavaScript-intro"
                 name="Course"
                 type="radio"
                 id="Java script" >
                 <label for="Fuul-Stack-Development ">Full stack development for 12 weeks</label>
                <input value="Full-stack-development"
                 name="Course"
                 type="radio"
                 id="Full stack development">

            </fieldset>
            <fieldset>
                <legend>Learning Prefrence</legend>
                <p>
                    Which learning resources do you prefer? [select all that applies]
                </p>
                <input id="video lesson"
                 name="learning"
                  type="checkbox">
                <label type="vedio-lesson">video lesson</label>
                <input id="writing tutorial"
                 name="learning"
                  type="checkbox">
                <label type="writing tutorial">writing tutorial</label>
                <input id="practice project"
                 name="learning"
                  type="checkbox">
                <label type="pactice project">pactice project</label>
            </fieldset>
            <fieldset>
                <legend>
                    Background information
                </legend>
                <label for="experience">previous coding experience</label>
                <select
                 name="experience"
                 id="experience"
                  required>
                    <option value="">--please select--</option>
                    <option value="non">complete biginner (no experience)</option>
                    <option value="Some-html">Some html and css</option>
                    <option value="Basic-js">Basic javascript</option>
                    <option value="Intermidiate">Intermidiate (build sevral project)</option>
                    <option value="Advance">Advance (profesinal experience)</option>
                </select>
                <label for="Age">Age</label>
                <input id="Age" 
                type="number" 
                placeholder="18"
                name="age"
                min="13" 
                max="100">
                <label for="Prefered time">Prefered time</label>
                <input id="prfered time"
                type="time"
                name="prefered time"
                >
                <label for="Goals">what are your learning goals</label>
                <textarea required
                 name="Goals"
                 id="goals" rows="5" cols="50" placeholder="tell us what you hope to achieve in this course">
                </textarea>
                <label for="commitment">weekly study hours (1 to 40)</label>
                <input type="range"
                id="commitment"
                name="commitment"
                min="1"
                max="40"
                value="10"
                type="range">
            </fieldset>
            <fieldset>
                <legend>Agreement</legend>
                <label>I agreeded to the <a href="term.html"> terms & condition</a> and 
                    <a href="privacy.html">privacy policy</a> (required)
                </label>
                <input id="terms"
                name="terms"
                type="checkbox"
                value="agreed">
                <input id="newsletter" name="newsletter" type="checkbox" value="yes">
                <label for="newsletter">send me email about new courses and special offers</label>
            </fieldset>
            <fieldset>
                <button type="submit">Register for course</button>
                <button type="reset">Clear form</button>
            </fieldset>
        </form>
        </main>
        <footer>
          
        </footer>
</body>
